<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sample Portfolio Replica</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fb;
        color: #111827;
      }
      main {
        max-width: 860px;
        margin: 48px auto;
        padding: 0 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 24px;
        color: #4b5563;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 12px;
      }
      a {
        display: block;
        text-decoration: none;
        color: #111827;
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px 16px;
      }
      a:hover {
        border-color: #cbd5e1;
        background: #f8fafc;
      }
    </style>
  </head>

    <main>
      <h1>Sample Portfolio Replica</h1>

</html>
